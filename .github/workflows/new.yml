name: JsxposedX CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ==============================================
      # 完全手动安装 Flutter，不依赖任何第三方 action
      # ==============================================
      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y curl git unzip xz-utils zip libgl1-mesa-glx libx11-xcb1

      - name: Download Flutter 3.27.2
        run: |
          cd /opt
          sudo git clone https://github.com/flutter/flutter.git -b 3.27.2 --depth 1

      - name: Add Flutter to PATH
        run: |
          echo "/opt/flutter/bin" >> $GITHUB_PATH
          echo "FLUTTER_ROOT=/opt/flutter" >> $GITHUB_ENV

      - name: Precache Flutter
        run: flutter --version

      - name: Disable analytics
        run: flutter config --no-analytics --no-cli-animations

      # ==============================================
      # 项目构建
      # ==============================================
      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Pigeon
        run: flutter pub run pigeon --input pigeons/message.dart

      - name: Build API100 AAB
        run: flutter build appbundle --flavor api100 --release

      - name: Build API101 APK
        run: flutter build apk --flavor api101 --release

      # ==============================================
      # 上传产物
      # ==============================================
      - name: Upload API100 AAB
        uses: actions/upload-artifact@v4
        with:
          name: jsxposedx-api100-aab
          path: build/app/outputs/bundle/api100Release/app-api100-release.aab
          retention-days: 7

      - name: Upload API101 APK
        uses: actions/upload-artifact@v4
        with:
          name: jsxposedx-api101-apk
          path: build/app/outputs/flutter-apk/app-api101-release.apk
          retention-days: 7
