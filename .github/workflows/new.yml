name: JsxposedX CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ubuntu:22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install base dependencies
        run: |
          apt update -y
          apt install -y curl git unzip xz-utils zip wget libgl1-mesa-glx libx11-xcb1 libnss3 libatk1.0-0

      # 安装 JDK 21
      - name: Install JDK 21
        run: |
          apt install -y openjdk-21-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64" >> $GITHUB_ENV

      # 手动安装 Flutter 3.27.2（对应 Dart 3.9.2）
      - name: Install Flutter
        run: |
          cd /usr/local
          curl -fsSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.27.2-stable.tar.xz -o flutter.tar.xz
          tar -xf flutter.tar.xz
          echo "/usr/local/flutter/bin" >> $GITHUB_ENV

      # 修复 git 安全权限
      - name: Fix git safe directory
        run: |
          git config --global --add safe.directory /usr/local/flutter

      - name: Check versions
        run: |
          flutter --version
          java -version

      - name: Disable Flutter analytics
        run: |
          flutter config --no-analytics --no-cli-animations

      # 构建项目
      - name: flutter pub get
        run: flutter pub get

      - name: Generate Pigeon
        run: flutter pub run pigeon --input pigeons/message.dart

      - name: Build API100 AAB
        run: flutter build appbundle --flavor api100 --release

      - name: Build API101 APK
        run: flutter build apk --flavor api101 --release

      # 只导出安装包
      - name: Upload API100 AAB
        uses: actions/upload-artifact@v4
        with:
          name: jsxposedx-api100-aab
          path: build/app/outputs/bundle/api100Release/app-api100-release.aab
          retention-days: 7

      - name: Upload API101 APK
        uses: actions/upload-artifact@v4
        with:
          name: jsxposedx-api101-apk
          path: build/app/outputs/flutter-apk/app-api101-release.apk
          retention-days: 7
