name: Build JsxposedX

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate pigeon
        run: flutter pub run pigeon --input pigeons/message.dart

      - name: Build apk api101
        run: flutter build apk --flavor api101 --release

      - name: Upload apk
        uses: actions/upload-artifact@v4
        with:
          name: jsxposedx-api101-release
          path: build/app/outputs/flutter-apk/app-api101-release.apk
