name: JsxposedX CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 强制不使用任何缓存
    env:
      PUB_CACHE: /tmp/pub_cache
      FLUTTER_CACHE: /tmp/flutter_cache

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 清理系统缓存
      - name: Clean all caches
        run: |
          sudo rm -rf ~/.gradle ~/.m2 ~/.pub-cache ~/.flutter
          sudo rm -rf /tmp/*
          sudo apt clean

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y curl git unzip xz-utils zip libgl1-mesa-glx libx11-xcb1

      # JDK 21
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 官网手动安装 Flutter（无缓存）
      - name: Download Flutter SDK
        run: |
          cd ~
          curl -fsSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.27.2-stable.tar.xz -o flutter.tar.xz
          tar -xf flutter.tar.xz

      - name: Add Flutter to PATH
        run: |
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Disable Flutter analytics
        run: flutter config --no-analytics --no-cli-animations

      # 全新依赖安装
      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Pigeon
        run: flutter pub run pigeon --input pigeons/message.dart

      # 构建
      - name: Build API100 AAB
        run: flutter build appbundle --flavor api100 --release

      - name: Build API101 APK
        run: flutter build apk --flavor api101 --release

      # 上传
      - name: Upload API100 AAB
        uses: actions/upload-artifact@v4
        with:
          name: jsxposedx-api100-aab
          path: build/app/outputs/bundle/api100Release/app-api100-release.aab
          retention-days: 7

      - name: Upload API101 APK
        uses: actions/upload-artifact@v4
        with:
          name: jsxposedx-api101-apk
          path: build/app/outputs/flutter-apk/app-api101-release.apk
          retention-days: 7
